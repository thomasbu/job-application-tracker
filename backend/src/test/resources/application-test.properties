# Base de données H2 en mémoire pour les tests (remplace MySQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway désactivé en test — H2 gère le schéma via ddl-auto=create-drop
spring.flyway.enabled=false

# JWT — valeur fictive pour les tests
jwt.secret=test-secret-key-for-unit-tests-only-not-used-in-prod-1234567890
jwt.expiration=3600000

# Email — désactivé en test
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# Désactive l'envoi réel d'emails
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
